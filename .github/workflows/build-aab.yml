name: Build AAB (release)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Décoder le keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/cubenova.jks"

      - name: Compiler l'AAB signé
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/cubenova.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle bundleRelease --no-daemon

      - name: Publier l'AAB
        uses: actions/upload-artifact@v4
        with:
          name: cubenova-release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Nettoyer le keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/cubenova.jks"
