name: Build AAB (release)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decoder le keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n ' | base64 -d > "$RUNNER_TEMP/cubenova.jks"
          ls -l "$RUNNER_TEMP/cubenova.jks"

      - name: Verifier le keystore (diagnostic)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "Taille du keystore : $(stat -c%s "$RUNNER_TEMP/cubenova.jks") octets (attendu ~2700)"
          echo "Longueur du mot de passe : ${#KEYSTORE_PASSWORD} caracteres"
          echo "Longueur de l alias : ${#KEY_ALIAS} caracteres"
          echo "--- Contenu du keystore :"
          keytool -list -keystore "$RUNNER_TEMP/cubenova.jks" -storepass "$KEYSTORE_PASSWORD" 2>&1 | head -20 || true
          echo "--- Test de l alias :"
          if keytool -list -keystore "$RUNNER_TEMP/cubenova.jks" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null 2>&1; then
            echo "OK : mot de passe et alias corrects."
          else
            echo "ECHEC : mot de passe du keystore ou alias incorrect."
            exit 1
          fi

      - name: Compiler l AAB signe
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/cubenova.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle bundleRelease --no-daemon

      - name: Verifier que l AAB est signe
        run: |
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          echo "AAB : $AAB"
          if unzip -l "$AAB" | grep -qE "META-INF/.*\.(RSA|EC|DSA)"; then
            echo "L AAB contient bien une signature."
          else
            echo "ATTENTION : aucune signature trouvee dans l AAB."
            exit 1
          fi

      - name: Publier l AAB
        uses: actions/upload-artifact@v4
        with:
          name: cubenova-release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Nettoyer le keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/cubenova.jks"
